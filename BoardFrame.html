<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangul Board Game Frame</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #f5f5f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
:root { --cell: 70px; --gap: 4px; }

.board {
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  display: grid;
  grid-template-columns: repeat(13, var(--cell));
  grid-template-rows: repeat(7, var(--cell));
  gap: var(--gap);
}

.cell {
  border: 2px solid #ccc;
  border-radius: 8px;
  background: #fafafa;
}
</style>
</head>
<body>
<div class="board">

  <!-- Row 1: col 1-5, col 9-13 -->
  <div class="cell" style="grid-column:1;  grid-row:1"></div>
  <div class="cell" style="grid-column:2;  grid-row:1"></div>
  <div class="cell" style="grid-column:3;  grid-row:1"></div>
  <div class="cell" style="grid-column:4;  grid-row:1"></div>
  <div class="cell" style="grid-column:5;  grid-row:1"></div>
  <div class="cell" style="grid-column:9;  grid-row:1"></div>
  <div class="cell" style="grid-column:10; grid-row:1"></div>
  <div class="cell" style="grid-column:11; grid-row:1"></div>
  <div class="cell" style="grid-column:12; grid-row:1"></div>
  <div class="cell" style="grid-column:13; grid-row:1"></div>

  <!-- Row 2: col 1, col 13 -->
  <div class="cell" style="grid-column:1;  grid-row:2"></div>
  <div class="cell" style="grid-column:13; grid-row:2"></div>

  <!-- Row 3: col 1-4, col 10-13 -->
  <div class="cell" style="grid-column:1;  grid-row:3"></div>
  <div class="cell" style="grid-column:2;  grid-row:3"></div>
  <div class="cell" style="grid-column:3;  grid-row:3"></div>
  <div class="cell" style="grid-column:4;  grid-row:3"></div>
  <div class="cell" style="grid-column:10; grid-row:3"></div>
  <div class="cell" style="grid-column:11; grid-row:3"></div>
  <div class="cell" style="grid-column:12; grid-row:3"></div>
  <div class="cell" style="grid-column:13; grid-row:3"></div>

  <!-- Row 4: col 1, col 13 -->
  <div class="cell" style="grid-column:4;  grid-row:4"></div>
  <div class="cell" style="grid-column:10; grid-row:4"></div>

  <!-- Row 5: col 1-4, col 10-13 -->
  <div class="cell" style="grid-column:1;  grid-row:5"></div>
  <div class="cell" style="grid-column:2;  grid-row:5"></div>
  <div class="cell" style="grid-column:3;  grid-row:5"></div>
  <div class="cell" style="grid-column:4;  grid-row:5"></div>
  <div class="cell" style="grid-column:10; grid-row:5"></div>
  <div class="cell" style="grid-column:11; grid-row:5"></div>
  <div class="cell" style="grid-column:12; grid-row:5"></div>
  <div class="cell" style="grid-column:13; grid-row:5"></div>

  <!-- Row 6: col 1, col 13 -->
  <div class="cell" style="grid-column:1;  grid-row:6"></div>
  <div class="cell" style="grid-column:13; grid-row:6"></div>

  <!-- Row 7: col 1-13 (bottom) -->
  <div class="cell" style="grid-column:1;  grid-row:7"></div>
  <div class="cell" style="grid-column:2;  grid-row:7"></div>
  <div class="cell" style="grid-column:3;  grid-row:7"></div>
  <div class="cell" style="grid-column:4;  grid-row:7"></div>
  <div class="cell" style="grid-column:5;  grid-row:7"></div>
  <div class="cell" style="grid-column:6;  grid-row:7"></div>
  <div class="cell" style="grid-column:7;  grid-row:7"></div>
  <div class="cell" style="grid-column:8;  grid-row:7"></div>
  <div class="cell" style="grid-column:9;  grid-row:7"></div>
  <div class="cell" style="grid-column:10; grid-row:7"></div>
  <div class="cell" style="grid-column:11; grid-row:7"></div>
  <div class="cell" style="grid-column:12; grid-row:7"></div>
  <div class="cell" style="grid-column:13; grid-row:7"></div>

</div>
</body>
</html>
