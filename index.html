<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangul Board Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw;
  height: 100vh;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.board {
  display: grid;
  grid-template-columns: repeat(13, var(--cell));
  grid-template-rows: repeat(7, var(--cell));
  gap: var(--gap);
}
.cell {
  border: 2px solid #aaa;
  border-radius: 8px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.cell img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 4px;
}
.cell.start img,
.cell.goal img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.cell.start, .cell.goal { cursor: default; border: none; }
.cell.fixed { cursor: default; }
.center-panel {
  grid-column: 5 / 10;
  grid-row: 2 / 7;
  border: none;
  background: transparent;
  cursor: default;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  overflow: visible;
  justify-content: center;
  padding-bottom: calc(var(--cell) * 0.5);
}
.center-panel img.title {
  width: 90%;
  object-fit: contain;
  padding: 0;
}
.players { display: flex; gap: 0px; font-size: calc(var(--cell) * 0.85); letter-spacing: -8px; margin-right: 8px; }
.controls { display: flex; gap: 80px; align-items: center; }
.ctrl-box { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.ctrl-label { font-size: calc(var(--cell) * 0.16); color: #555; font-weight: 700; font-family: sans-serif; }
.dice-btn {
  border: none;
  background: transparent;
  cursor: pointer;
  width: calc(var(--cell) * 0.68);
  height: calc(var(--cell) * 0.68);
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s;
}
.dice-btn:active { transform: scale(0.93); }
.dice-btn svg { width: 100%; height: 100%; }
.reset-btn {
  width: calc(var(--cell) * 0.68);
  height: calc(var(--cell) * 0.68);
  border-radius: 12px;
  background: #2a2a2a;
  color: white;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 3px 4px 8px rgba(0,0,0,0.3);
  transition: transform 0.1s;
}
.reset-btn:active { transform: scale(0.93); }
.reset-btn svg { width: 62%; height: 62%; }
.cell.fixed { cursor: default; }
</style>
</head>
<body>
<div class="board" id="board"></div>
<script>
const BASE = 'https://ryuu-spec.github.io/Hangul_Board_Game/image/';
const SPINNER_BASE = 'https://ryuu-spec.github.io/Hangul-Syllable-spinner/';

const CONS = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const VOWS = ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅚ','ㅛ','ㅜ','ㅝ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];

// 고정 칸 (Genially와 동일한 위치)
const FIXED = {
  '6-1': 'start',
  '8-1': 'goal',
  '1-1': 'question',
  '4-3': 'question',
  '10-3': 'question',
  '1-7': 'question',
  '13-7': 'question',
  '13-1': 'mission',
  '1-3': 'mission',
  '13-5': 'mission',
  '4-5': 'mission',
  '7-7': 'mission',
};

const POSITIONS = [
  {col:1,row:1},{col:2,row:1},{col:3,row:1},{col:4,row:1},{col:5,row:1},
  {col:6,row:1},{col:8,row:1},
  {col:9,row:1},{col:10,row:1},{col:11,row:1},{col:12,row:1},{col:13,row:1},
  {col:1,row:2},{col:13,row:2},
  {col:1,row:3},{col:2,row:3},{col:3,row:3},{col:4,row:3},
  {col:10,row:3},{col:11,row:3},{col:12,row:3},{col:13,row:3},
  {col:4,row:4},{col:10,row:4},
  {col:1,row:5},{col:2,row:5},{col:3,row:5},{col:4,row:5},
  {col:10,row:5},{col:11,row:5},{col:12,row:5},{col:13,row:5},
  {col:1,row:6},{col:13,row:6},
  {col:1,row:7},{col:2,row:7},{col:3,row:7},{col:4,row:7},{col:5,row:7},
  {col:6,row:7},{col:7,row:7},{col:8,row:7},{col:9,row:7},
  {col:10,row:7},{col:11,row:7},{col:12,row:7},{col:13,row:7}
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function openSpinner(type, char) {
  if (type === 'cons')
    window.open(`${SPINNER_BASE}Vowel_Spinner.html?char=${encodeURIComponent(char)}&type=vowel`,'_blank','width=520,height=420');
  else if (type === 'vowel')
    window.open(`${SPINNER_BASE}Vowel_Spinner.html?char=${encodeURIComponent(char)}&type=consonant`,'_blank','width=520,height=420');
  else if (type === 'question')
    window.open(`${SPINNER_BASE}Syllable_Spinner.html`,'_blank','width=520,height=420');
}

function makeImg(src, alt) {
  const img = document.createElement('img');
  img.src = src;
  img.alt = alt;
  return img;
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // 랜덤 풀: 고정 칸 제외한 나머지 35칸 = 자음19 + 모음16
  const pool = shuffle([
    ...CONS.map(c => ({type:'cons', char:c})),
    ...VOWS.map(v => ({type:'vowel', char:v}))
  ]);
  let idx = 0;

  // 가운데 패널 추가
  const cp = document.createElement("div");
  cp.className = "cell center-panel";
  cp.style.gridColumn = "5 / 10";
  cp.style.gridRow = "2 / 7";
  cp.innerHTML = `
    <img class="title" src="${BASE}title.png" alt="Hangul Board Game" style="width:80%; object-fit:contain; padding:0; margin:0; margin-top: calc(var(--cell) * 1.1);">
    <div class="controls" style="margin-top:2px;">
      <div class="ctrl-box"><span class="ctrl-label">Roll the die</span><button class="dice-btn" id="dice-btn" onclick="rollDice(this)"></button></div>
      <div class="ctrl-box"><span class="ctrl-label">Reset Button</span><button class="reset-btn" onclick="buildBoard()"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 12a8 8 0 1 1 1.5 4.8" stroke="white" stroke-width="2.5" stroke-linecap="round"/><polyline points="4,8 4,12 8,12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
    </div>
  `;
  board.appendChild(cp);

  // 주사위 초기 SVG 삽입
  const diceBtn = document.getElementById('dice-btn');
  if (diceBtn) diceBtn.innerHTML = getDiceSVG(6);

  // 말 토큰 배치 (보드 렌더링 후 실행)
  setTimeout(placePieces, 50);

  POSITIONS.forEach(pos => {
    const key = `${pos.col}-${pos.row}`;
    const fixed = FIXED[key];
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.gridColumn = pos.col;
    cell.style.gridRow = pos.row;

    if (fixed === 'start') {
      cell.classList.add('start');
      cell.appendChild(makeImg(`${BASE}Start.png`, 'START'));
    } else if (fixed === 'goal') {
      cell.classList.add('goal');
      cell.appendChild(makeImg(`${BASE}Goal.png`, 'GOAL'));
    } else if (fixed === 'question') {
      cell.classList.add('fixed');
      cell.appendChild(makeImg(`${BASE}question.png`, '?'));
      cell.addEventListener('click', () => openSpinner('question', ''));
    } else if (fixed === 'mission') {
      cell.classList.add('fixed');
      cell.appendChild(makeImg(`${BASE}mission.png`, 'mission'));
    } else {
      const data = pool[idx++];
      if (data.type === 'cons') {
        cell.appendChild(makeImg(`${BASE}${encodeURIComponent(data.char)}.png`, data.char));
        cell.addEventListener('click', () => openSpinner('cons', data.char));
      } else {
        cell.appendChild(makeImg(`${BASE}${encodeURIComponent(data.char)}.png`, data.char));
        cell.addEventListener('click', () => openSpinner('vowel', data.char));
      }
    }
    board.appendChild(cell);
  });
}

function getDiceSVG(num) {
  const dots = {
    1: [[50,50]],
    2: [[30,30],[70,70]],
    3: [[30,30],[50,50],[70,70]],
    4: [[30,30],[70,30],[30,70],[70,70]],
    5: [[30,30],[70,30],[50,50],[30,70],[70,70]],
    6: [[30,26],[70,26],[30,50],[70,50],[30,74],[70,74]]
  };
  const circles = dots[num].map(([cx,cy]) =>
    `<circle cx="${cx}" cy="${cy}" r="9" fill="#222"/>`
  ).join('');
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="3" width="94" height="94" rx="18" ry="18" fill="white" stroke="#bbb" stroke-width="4"/>
    ${circles}
  </svg>`;
}

let currentCell = 80;
let pieceEls = [];

const PIECE_COLORS = ['#E8302A','#F5A623','#27AE60','#7B2D8B','#E91E8C'];

function placePieces() {
  pieceEls.forEach(p => p.remove());
  pieceEls = [];

  const board = document.getElementById('board');
  const br = board.getBoundingClientRect();
  const GAP = 4;
  const sz = currentCell * 0.72;
  const totalW = PIECE_COLORS.length * sz + (PIECE_COLORS.length - 1) * 6;
  const startX = br.left + br.width / 2 - totalW / 2;
  // row 2 area (top of center panel)
  const startY = br.top + (currentCell + GAP) * 1.05;

  PIECE_COLORS.forEach((color, i) => {
    const el = document.createElement('div');
    el.className = 'piece-token';
    Object.assign(el.style, {
      position: 'fixed',
      left: (startX + i * (sz + 6)) + 'px',
      top: startY + 'px',
      width: sz + 'px',
      height: sz + 'px',
      fontSize: (sz * 0.9) + 'px',
      color: color,
      cursor: 'grab',
      zIndex: '200',
      userSelect: 'none',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      filter: 'drop-shadow(1px 3px 4px rgba(0,0,0,0.4))',
      lineHeight: '1',
    });
    el.textContent = '♟';
    makeDraggable(el);
    document.body.appendChild(el);
    pieceEls.push(el);
  });
}

function makeDraggable(el) {
  const start = (cx, cy) => {
    const ox = parseFloat(el.style.left);
    const oy = parseFloat(el.style.top);
    el.style.cursor = 'grabbing';
    el.style.zIndex = '1000';

    const move = (mx, my) => {
      el.style.left = (ox + mx - cx) + 'px';
      el.style.top  = (oy + my - cy) + 'px';
    };
    const end = () => {
      el.style.cursor = 'grab';
      el.style.zIndex = '200';
      document.removeEventListener('mousemove', onMM);
      document.removeEventListener('mouseup',   onMU);
      el.removeEventListener('touchmove', onTM);
      el.removeEventListener('touchend',  onTE);
    };
    const onMM = e => move(e.clientX, e.clientY);
    const onMU = () => end();
    const onTM = e => { e.preventDefault(); const t=e.touches[0]; move(t.clientX,t.clientY); };
    const onTE = () => end();

    document.addEventListener('mousemove', onMM);
    document.addEventListener('mouseup',   onMU);
    el.addEventListener('touchmove', onTM, { passive: false });
    el.addEventListener('touchend',  onTE);
  };

  el.addEventListener('mousedown', e => { e.preventDefault(); start(e.clientX, e.clientY); });
  el.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; start(t.clientX,t.clientY); }, { passive: false });
}

function rollDice(btn) {
  let c = 0;
  const iv = setInterval(() => {
    const face = Math.floor(Math.random()*6) + 1;
    btn.innerHTML = getDiceSVG(face);
    if (++c >= 12) clearInterval(iv);
  }, 75);
}

function resize() {
  const GAP = 4, COLS = 13, ROWS = 7;
  const maxW = window.innerWidth * 0.92;
  const maxH = window.innerHeight * 0.92;
  const cell = Math.min(
    Math.floor((maxW - GAP*(COLS-1)) / COLS),
    Math.floor((maxH - GAP*(ROWS-1)) / ROWS)
  );
  currentCell = cell;
  const b = document.getElementById('board');
  b.style.setProperty('--cell', cell + 'px');
  b.style.setProperty('--gap', GAP + 'px');
  // 리사이즈 시 말 위치도 재조정
  if (pieceEls.length > 0) placePieces();
}

resize();
window.addEventListener('resize', resize);
buildBoard();
</script>
</body>
</html>
