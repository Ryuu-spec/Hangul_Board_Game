<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글 보드 게임 (Hangul Board Game)</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #fcfcfc;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        /* [수정] 게임 보드판을 감싸는 전체 컨테이너 */
        .game-container {
            width: 100%;
            max-width: 1000px; /* Genially 안에서 너무 퍼지지 않도록 최대 크기 제한 */
            margin: 0 auto;
            position: relative;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5rem;
            margin: 10px 0;
            font-family: 'Georgia', serif;
            font-style: italic;
        }

        /* [수정] 보드판: 비율 유지 및 반응형 설정 */
        .board {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 2px;
            background-color: #ccc;
            padding: 4px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
            aspect-ratio: 12 / 7; /* [중요] 가로 세로 칸 비율을 완벽하게 고정 */
        }

        /* [수정] 보드판의 각 칸 */
        .cell {
            background-color: white;
            border: 1px solid #bbb;
            border-radius: 8px;
            display: flex;
            align-content: center;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            overflow: hidden; /* 말이 칸 밖으로 탈출하는 것 방지 */
        }

        .cell img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        /* [수정] 중앙 컨트롤 영역 (주사위, 리셋 버튼) */
        .controls {
            grid-column: 4 / 10;
            grid-row: 3 / 6;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: none;
            z-index: 1;
        }

        .control-buttons {
            display: flex;
            gap: 40px;
            margin-top: 10px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
        }

        .dice, .reset-btn {
            font-size: 3rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
            transition: transform 0.2s;
        }

        .dice:hover, .reset-btn:hover {
            transform: scale(1.1);
        }

        /* [수정] 대망의 말 토큰(piece) 스타일 변경 */
        .piece {
            /* 기존 고정 크기(width: 60px) 대신, 부모 칸 크기의 70%로 설정 */
            width: 70%; 
            height: 70%;
            position: absolute;
            z-index: 10;
            transition: all 0.5s ease;
            cursor: pointer;
            object-fit: contain; /* 캐릭터가 찌그러지지 않고 비율 유지 */
        }

        /* 캐릭터 선택 창 스타일 */
        .character-selection {
            grid-column: 4 / 10;
            grid-row: 2 / 3;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        .char-btn {
            width: 7%;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 50%;
            transition: transform 0.2s, border-color 0.2s;
            object-fit: contain;
        }

        .char-btn:hover {
            transform: scale(1.1);
        }

        .char-btn.selected {
            border-color: #2e7d32;
            background-color: #e8f5e9;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="board" id="board">
            <div class="controls">
                <h1>Hangul Board Game</h1>
                <div class="control-buttons">
                    <div class="control-item">
                        <span>Roll the die</span>
                        <button class="dice" id="diceBtn" onclick="rollDice()">⚅</button>
                    </div>
                    <div class="control-item">
                        <span>Reset Button</span>
                        <button class="reset-btn" id="resetBtn" onclick="resetGame()">🔄</button>
                    </div>
                </div>
            </div>

            <div class="character-selection" id="charSelection">
                </div>
        </div>
    </div>

    <script>
        // 보드판 레이아웃 배열 (좌표 데이터)
        const boardLayout = [
            { id: 1, type: 'start', label: 'START', row: 1, col: 5 },
            { id: 2, type: 'consonant', label: 'ㅅ', row: 1, col: 4 },
            { id: 3, type: 'consonant', label: 'ㅁ', row: 1, col: 3 },
            { id: 4, type: 'vowel', label: 'ㅕ', row: 1, col: 2 },
            { id: 5, type: 'consonant', label: 'ㄲ', row: 1, col: 1 },
            { id: 6, type: 'special', label: '물음표', row: 2, col: 1 },
            { id: 7, type: 'vowel', label: 'ㅣ', row: 3, col: 1 },
            { id: 8, type: 'special', label: '탈', row: 4, col: 1 },
            { id: 9, type: 'consonant', label: 'ㅋ', row: 4, col: 2 },
            { id: 10, type: 'consonant', label: 'ㅈ', row: 4, col: 3 },
            { id: 11, type: 'special', label: '물음표', row: 4, col: 4 },
            { id: 12, type: 'vowel', label: 'ㅕ', row: 5, col: 4 },
            { id: 13, type: 'special', label: '탈', row: 6, col: 4 },
            { id: 14, type: 'consonant', label: 'ㅌ', row: 6, col: 3 },
            { id: 15, type: 'consonant', label: 'ㄸ', row: 6, col: 2 },
            { id: 16, type: 'consonant', label: 'ㅊ', row: 6, col: 1 },
            { id: 17, type: 'vowel', label: 'ㅓ', row: 7, col: 1 },
            { id: 18, type: 'special', label: '물음표', row: 8, col: 1 }, // 아래쪽 라인으로 연결 시 임시 조정 가능
            
            // 하단 라인 (row 7 고정, col 1에서 12까지 이동)
            { id: 19, type: 'consonant', label: 'ㅇ', row: 7, col: 2 },
            { id: 20, type: 'vowel', label: 'ㅏ', row: 7, col: 3 },
            { id: 21, type: 'consonant', label: 'ㄴ', row: 7, col: 4 },
            { id: 22, type: 'vowel', label: 'ㅗ', row: 7, col: 5 },
            { id: 23, type: 'vowel', label: 'ㅓ', row: 7, col: 6 },
            { id: 24, type: 'special', label: '탈', row: 7, col: 7 },
            { id: 25, type: 'consonant', label: 'ㅉ', row: 7, col: 8 },
            { id: 26, type: 'vowel', label: 'ㅠ', row: 7, col: 9 },
            { id: 27, type: 'vowel', label: 'ㅐ', row: 7, col: 10 },
            { id: 28, type: 'consonant', label: 'ㅌ', row: 7, col: 11 },
            { id: 29, type: 'consonant', label: 'ㅂ', row: 7, col: 12 },
            { id: 30, type: 'special', label: '물음표', row: 7, col: 12 }, // 필요시 위치 조정
            
            // 우측 및 내부 복잡한 라인 매핑
            { id: 31, type: 'special', label: '물음표', row: 7, col: 12 },
            { id: 32, type: 'consonant', label: 'ㅆ', row: 6, col: 12 },
            { id: 33, type: 'special', label: '탈', row: 5, col: 12 },
            { id: 34, type: 'vowel', label: 'ㅑ', row: 5, col: 11 },
            { id: 35, type: 'consonant', label: 'ㅃ', row: 5, col: 10 },
            { id: 36, type: 'consonant', label: 'ㄷ', row: 5, col: 9 },
            { id: 37, type: 'consonant', label: 'ㄱ', row: 4, col: 9 },
            { id: 38, type: 'special', label: '물음표', row: 3, col: 9 },
            { id: 39, type: 'consonant', label: 'ㄲ', row: 3, col: 10 },
            { id: 40, type: 'consonant', label: 'ㅍ', row: 3, col: 11 },
            { id: 41, type: 'vowel', label: 'ㅔ', row: 3, col: 12 },
            { id: 42, type: 'consonant', label: 'ㅎ', row: 2, col: 12 },
            { id: 43, type: 'special', label: '탈', row: 1, col: 12 },
            { id: 44, type: 'consonant', label: 'ㄹ', row: 1, col: 11 },
            { id: 45, type: 'consonant', label: 'ㅃ', row: 1, col: 10 },
            { id: 46, type: 'vowel', label: 'ㅡ', row: 1, col: 9 },
            { id: 47, type: 'vowel', label: 'ㅕ', row: 1, col: 8 },
            { id: 48, type: 'goal', label: 'GOAL', row: 1, col: 7 }
        ];

        // 깃허브 이미지 베이스 URL (수정된 Girl_1 적용 반영)
        const imgBaseUrl = "https://raw.githubusercontent.com/sunmool3/hangul/main/";
        const characterImages = [
            imgBaseUrl + "Boy_1.png",
            imgBaseUrl + "Girl_1.png", // 오타 수정 완료!
            imgBaseUrl + "Boy_2.png",
            imgBaseUrl + "Girl_2.png",
            imgBaseUrl + "Boy_3.png",
            imgBaseUrl + "Girl_3.png"
        ];

        // 이미지 매핑 데이터
        const tileImages = {
            'start': imgBaseUrl + 'start.png',
            'goal': imgBaseUrl + 'goal.png',
            '물음표': imgBaseUrl + 'question.png',
            '탈': imgBaseUrl + 'tal.png',
            'ㄱ': imgBaseUrl + 'g.png', 'ㄴ': imgBaseUrl + 'n.png', 'ㄷ': imgBaseUrl + 'd.png', 'ㄹ': imgBaseUrl + 'r.png',
            'ㅁ': imgBaseUrl + 'm.png', 'ㅂ': imgBaseUrl + 'b.png', 'ㅅ': imgBaseUrl + 's.png', 'ㅇ': imgBaseUrl + 'ng.png',
            'ㅈ': imgBaseUrl + 'j.png', 'ㅊ': imgBaseUrl + 'ch.png', 'ㅋ': imgBaseUrl + 'k.png', 'ㅌ': imgBaseUrl + 't.png',
            'ㅍ': imgBaseUrl + 'p.png', 'ㅎ': imgBaseUrl + 'h.png', 'ㄲ': imgBaseUrl + 'gg.png', 'ㄸ': imgBaseUrl + 'dd.png',
            'ㅃ': imgBaseUrl + 'bb.png', 'ㅆ': imgBaseUrl + 'ss.png', 'ㅉ': imgBaseUrl + 'jj.png',
            'ㅏ': imgBaseUrl + 'a.png', 'ㅑ': imgBaseUrl + 'ya.png', 'ㅓ': imgBaseUrl + 'eo.png', 'ㅕ': imgBaseUrl + 'yeo.png',
            'ㅗ': imgBaseUrl + 'o.png', 'ㅛ': imgBaseUrl + 'yo.png', 'ㅜ': imgBaseUrl + 'u.png', 'ㅠ': imgBaseUrl + 'yu.png',
            'ㅡ': imgBaseUrl + 'eu.png', 'ㅣ': imgBaseUrl + 'i.png', 'ㅐ': imgBaseUrl + 'ae.png', 'ㅔ': imgBaseUrl + 'e.png'
        };

        let playerPositions = Array(characterImages.length).fill(1); // 모든 플레이어 1번 칸(START)에서 시작
        let selectedPlayer = 0; // 기본 선택은 첫 번째 캐릭터
        const diceSymbols = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        // 보드판 생성 함수
        function createBoard() {
            const board = document.getElementById('board');
            
            boardLayout.forEach(tile => {
                const cell = document.createElement('div');
                cell.className = `cell ${tile.type}`;
                cell.style.gridRow = tile.row;
                cell.style.gridColumn = tile.col;
                cell.id = `cell-${tile.id}`;

                const img = document.createElement('img');
                img.src = tileImages[tile.label] || tileImages[tile.type] || '';
                img.alt = tile.label;
                cell.appendChild(img);
                board.appendChild(cell);
            });

            createCharacterSelection();
            createPieces();
        }

        // 캐릭터 선택 버튼 생성
        function createCharacterSelection() {
            const selectionContainer = document.getElementById('charSelection');
            characterImages.forEach((imgSrc, index) => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = `char-btn ${index === 0 ? 'selected' : ''}`;
                img.onclick = () => selectPlayer(index);
                selectionContainer.appendChild(img);
            });
        }

        // [수정] 말 토큰 생성 및 배치 방식 변경
        function createPieces() {
            characterImages.forEach((imgSrc, index) => {
                const piece = document.createElement('img');
                piece.src = imgSrc;
                piece.className = 'piece';
                piece.id = `piece-${index}`;
                piece.onclick = () => selectPlayer(index);
                document.getElementById('board').appendChild(piece);
                movePieceToCell(index, 1); // 최초에 1번(START) 칸으로 이동
            });
        }

        // 플레이어 선택 변경
        function selectPlayer(index) {
            selectedPlayer = index;
            document.querySelectorAll('.char-btn').forEach((btn, idx) => {
                btn.classList.toggle('selected', idx === index);
            });
        }

        // [수정] 말을 특정 칸으로 이동시키는 함수 (px 연산 제거, Grid에 직접 배치)
        function movePieceToCell(playerIndex, tileId) {
            const piece = document.getElementById(`piece-${playerIndex}`);
            const tile = boardLayout.find(t => t.id === tileId);
            
            if (piece && tile) {
                // 부모 그리드 안에서 배치되도록 gridRow와 gridColumn을 직접 주입합니다.
                piece.style.gridRow = tile.row;
                piece.style.gridColumn = tile.col;

                // [수정] 한 칸에 여러 말이 겹칠 때 살짝 어긋나게 배치하여 겹쳐 보이도록 설정 (반응형 % 단위)
                const offsetMultiplier = 8; // 간격 % 조정
                const xOffset = (playerIndex % 3) * offsetMultiplier - offsetMultiplier;
                const yOffset = Math.floor(playerIndex / 3) * offsetMultiplier - offsetMultiplier;
                
                piece.style.transform = `translate(${xOffset}%, ${yOffset}%)`;
            }
        }

        // 주사위 굴리기
        function rollDice() {
            const diceBtn = document.getElementById('diceBtn');
            diceBtn.disabled = true;
            
            let count = 0;
            const interval = setInterval(() => {
                const randomRoll = Math.floor(Math.random() * 6) + 1;
                diceBtn.innerText = diceSymbols[randomRoll - 1];
                count++;
                
                if (count > 10) {
                    clearInterval(interval);
                    const finalRoll = Math.floor(Math.random() * 6) + 1;
                    diceBtn.innerText = diceSymbols[finalRoll - 1];
                    
                    // 말 이동 로직
                    let currentPos = playerPositions[selectedPlayer];
                    let nextPos = currentPos + finalRoll;
                    
                    if (nextPos > 48) nextPos = 48; // GOAL 칸에 고정
                    
                    playerPositions[selectedPlayer] = nextPos;
                    movePieceToCell(selectedPlayer, nextPos);
                    
                    diceBtn.disabled = false;
                }
            }, 50);
        }

        // 게임 리셋
        function resetGame() {
            playerPositions = Array(characterImages.length).fill(1);
            characterImages.forEach((_, index) => {
                movePieceToCell(index, 1);
            });
            document.getElementById('diceBtn').innerText = '⚅';
            selectPlayer(0);
        }

        // 페이지 로드 시 보드 생성
        window.onload = createBoard;
    </script>
</body>
</html>
