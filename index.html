<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangul Board Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw;
  height: 100vh;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.board {
  display: grid;
  grid-template-columns: repeat(13, var(--cell));
  grid-template-rows: repeat(7, var(--cell));
  gap: var(--gap);
}
.cell {
  border: 2px solid #aaa;
  border-radius: 8px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.cell img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 4px;
}
.cell.start img,
.cell.goal img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.cell.start, .cell.goal { cursor: default; border: none; }
.cell.fixed { cursor: default; }
.center-panel {
  grid-column: 5 / 10;
  grid-row: 2 / 7;
  border: none;
  background: transparent;
  cursor: default;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  overflow: visible;
  justify-content: center;
  padding-bottom: calc(var(--cell) * 0.5);
}
.center-panel img.title {
  width: 90%;
  object-fit: contain;
  padding: 0;
}
.players { display: flex; gap: 0px; font-size: calc(var(--cell) * 0.85); letter-spacing: -8px; margin-right: 8px; }
.controls { display: flex; gap: 80px; align-items: center; }
.ctrl-box { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.ctrl-label { font-size: calc(var(--cell) * 0.16); color: #555; font-weight: 700; font-family: sans-serif; }
.dice-btn {
  border: none;
  background: transparent;
  cursor: pointer;
  width: calc(var(--cell) * 0.68);
  height: calc(var(--cell) * 0.68);
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s;
}
.dice-btn:active { transform: scale(0.93); }
.dice-btn svg { width: 100%; height: 100%; }
.reset-btn {
  width: calc(var(--cell) * 0.68);
  height: calc(var(--cell) * 0.68);
  border-radius: 12px;
  background: #2a2a2a;
  color: white;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 3px 4px 8px rgba(0,0,0,0.3);
  transition: transform 0.1s;
}
.reset-btn:active { transform: scale(0.93); }
.reset-btn svg { width: 62%; height: 62%; }
.cell.fixed { cursor: default; }

/* ===== 스피너 모달 ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center; justify-content: center;
  z-index: 5000;
  font-family: 'Noto Sans KR', sans-serif;
}
.modal-overlay.active { display: flex; }
.modal-card {
  background: #fff;
  border-radius: 24px;
  padding: 2rem 1.8rem 1.6rem;
  width: 92%;
  max-width: 460px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  position: relative;
  animation: modalPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modalPop {
  0% { transform: scale(0.85); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.modal-card.consonant-mode { border: 3px solid #97C459; }
.modal-card.vowel-mode { border: 3px solid #EF9F27; }
.modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 1.2rem;
  letter-spacing: 0.5px;
}
.modal-card.consonant-mode .modal-title { color: #639922; }
.modal-card.vowel-mode .modal-title { color: #BA7517; }
.modal-combo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin-bottom: 1.2rem;
}
.modal-char-box {
  width: 130px; height: 130px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 84px;
  font-weight: 900;
  background: #f8f8f8;
  border: 2px solid #eee;
  font-family: 'Noto Sans KR', sans-serif;
}
.modal-card.consonant-mode .modal-fixed { color: #97C459; }
.modal-card.consonant-mode .modal-spin { color: #EF9F27; }
.modal-card.vowel-mode .modal-fixed { color: #EF9F27; }
.modal-card.vowel-mode .modal-spin { color: #97C459; }
.modal-spin.spinning { animation: spinFlip 0.08s ease infinite alternate; }
.modal-spin.done { animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes spinFlip {
  0% { transform: scaleY(1); opacity: 1; }
  100% { transform: scaleY(0.6); opacity: 0.7; }
}
@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.modal-operator {
  font-size: 36px;
  color: #ccc;
  font-weight: 700;
}
.modal-hint {
  font-size: 13px;
  color: #999;
  margin-bottom: 1.4rem;
  line-height: 1.5;
}
.modal-close {
  background: #2a2a2a;
  color: white;
  border: none;
  padding: 12px 48px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: transform 0.1s, background 0.2s;
}
.modal-close:hover { background: #444; }
.modal-close:active { transform: scale(0.96); }
.modal-close:disabled { opacity: 0.4; cursor: not-allowed; }

/* Genially 화면 크기에 맞게 드래그용 말 토큰 크기를 자동 조절하는 클래스 추가 */
.piece-token img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="board" id="board"></div>

<div class="modal-overlay" id="spinnerModal">
  <div class="modal-card" id="modalCard">
    <div class="modal-title" id="modalTitle">Hangul Spinner</div>
    <div class="modal-combo" id="modalCombo"></div>
    <p class="modal-hint" id="modalHint">Combine and read it aloud!</p>
    <button class="modal-close" id="modalCloseBtn" onclick="closeSpinner()">CLOSE</button>
  </div>
</div>
<script>
const BASE = 'https://ryuu-spec.github.io/Hangul_Board_Game/image/';
const SPINNER_BASE = 'https://ryuu-spec.github.io/Hangul-Syllable-spinner/';

const CONS = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const VOWS = ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅚ','ㅛ','ㅜ','ㅝ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];

// 고정 칸 (Genially와 동일한 위치)
const FIXED = {
  '6-1': 'start',
  '8-1': 'goal',
  '1-1': 'question',
  '4-3': 'question',
  '10-3': 'question',
  '1-7': 'question',
  '13-7': 'question',
  '13-1': 'mission',
  '1-3': 'mission',
  '13-5': 'mission',
  '4-5': 'mission',
  '7-7': 'mission',
};

const POSITIONS = [
  {col:1,row:1},{col:2,row:1},{col:3,row:1},{col:4,row:1},{col:5,row:1},
  {col:6,row:1},{col:8,row:1},
  {col:9,row:1},{col:10,row:1},{col:11,row:1},{col:12,row:1},{col:13,row:1},
  {col:1,row:2},{col:13,row:2},
  {col:1,row:3},{col:2,row:3},{col:3,row:3},{col:4,row:3},
  {col:10,row:3},{col:11,row:3},{col:12,row:3},{col:13,row:3},
  {col:4,row:4},{col:10,row:4},
  {col:1,row:5},{col:2,row:5},{col:3,row:5},{col:4,row:5},
  {col:10,row:5},{col:11,row:5},{col:12,row:5},{col:13,row:5},
  {col:1,row:6},{col:13,row:6},
  {col:1,row:7},{col:2,row:7},{col:3,row:7},{col:4,row:7},{col:5,row:7},
  {col:6,row:7},{col:7,row:7},{col:8,row:7},{col:9,row:7},
  {col:10,row:7},{col:11,row:7},{col:12,row:7},{col:13,row:7}
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function openSpinner(type, char) {
  if (type === 'question') {
    // ? 칸은 나중에 결정 - 일단 placeholder
    return;
  }
  showSpinnerModal(type, char);
}

// ===== 유효 음절 매핑 (무의미 조합 제외) =====
// 각 자음별 허용 모음 풀
const VALID_VOWELS_FOR_CONS = {
  // 쉬운 자음: 모든 모음 사용 가능
  'ㅇ': VOWS,
  'ㄴ': VOWS,
  'ㅁ': VOWS,
  'ㄱ': VOWS,
  'ㄷ': VOWS,
  'ㅂ': VOWS,
  'ㅎ': VOWS,
  'ㅅ': VOWS,
  'ㅈ': VOWS,
  // 중간 자음: 어려운 모음 일부 제한
  'ㄹ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ'],
  'ㅋ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ','ㅟ','ㅚ'],
  'ㅌ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ','ㅟ','ㅚ'],
  'ㅍ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ'],
  'ㅊ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ','ㅟ','ㅚ'],
  // 어려운 자음: 어려운 모음 대부분 제한
  'ㄲ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ','ㅟ','ㅚ','ㅘ'],
  'ㄸ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅢ','ㅣ','ㅟ'],
  'ㅃ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ'],
  'ㅆ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ','ㅟ','ㅚ','ㅘ'],
  'ㅉ': ['ㅏ','ㅐ','ㅑ','ㅓ','ㅔ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ','ㅚ']
};

// 모음 칸에 도착했을 때, 해당 모음과 결합 가능한 자음 풀
function validConsonantsForVowel(vowel) {
  return CONS.filter(c => {
    const pool = VALID_VOWELS_FOR_CONS[c];
    return pool && pool.includes(vowel);
  });
}

// ===== 스피너 모달 =====
let modalSpinning = false;
let modalInterval = null;
const modalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playModalClick() {
  try {
    const o = modalAudioCtx.createOscillator(), g = modalAudioCtx.createGain();
    o.connect(g); g.connect(modalAudioCtx.destination);
    o.frequency.value = 600; o.type = 'square';
    g.gain.setValueAtTime(0.06, modalAudioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, modalAudioCtx.currentTime + 0.04);
    o.start(modalAudioCtx.currentTime); o.stop(modalAudioCtx.currentTime + 0.04);
  } catch(e) {}
}

function playModalChime() {
  try {
    [523,659,784].forEach((freq,i) => {
      const o = modalAudioCtx.createOscillator(), g = modalAudioCtx.createGain();
      o.connect(g); g.connect(modalAudioCtx.destination);
      o.frequency.value = freq; o.type = 'sine';
      const t = modalAudioCtx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  } catch(e) {}
}

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function showSpinnerModal(type, fixedChar) {
  const overlay = document.getElementById('spinnerModal');
  const card    = document.getElementById('modalCard');
  const title   = document.getElementById('modalTitle');
  const hint    = document.getElementById('modalHint');
  const combo   = document.getElementById('modalCombo');
  const closeBtn= document.getElementById('modalCloseBtn');

  let pool, modeClass, titleText, hintText, layout;

  if (type === 'cons') {
    pool = VALID_VOWELS_FOR_CONS[fixedChar] || VOWS;
    modeClass = 'consonant-mode';
    titleText = 'Hangul Vowel Picker';
    hintText  = 'Combine with the consonant and read it aloud!';
    layout = `
      <div class="modal-char-box modal-fixed">${fixedChar}</div>
      <div class="modal-operator">+</div>
      <div class="modal-char-box modal-spin" id="modalSpinBox">?</div>`;
  } else {
    pool = validConsonantsForVowel(fixedChar);
    if (pool.length === 0) pool = CONS; 
    modeClass = 'vowel-mode';
    titleText = 'Hangul Consonant Picker';
    hintText  = 'Combine with the vowel and read it aloud!';
    layout = `
      <div class="modal-char-box modal-spin" id="modalSpinBox">?</div>
      <div class="modal-operator">+</div>
      <div class="modal-char-box modal-fixed">${fixedChar}</div>`;
  }

  card.className = 'modal-card ' + modeClass;
  title.textContent = titleText;
  hint.textContent  = hintText;
  combo.innerHTML   = layout;
  closeBtn.disabled = true;
  overlay.classList.add('active');

  startModalSpin(pool);
}

function startModalSpin(pool) {
  if (modalSpinning) return;
  modalSpinning = true;

  const spinBox = document.getElementById('modalSpinBox');
  const closeBtn = document.getElementById('modalCloseBtn');

  spinBox.className = 'modal-char-box modal-spin';

  let count = 0;
  const total = 20; 
  modalInterval = setInterval(() => {
    spinBox.textContent = rand(pool);
    spinBox.className   = 'modal-char-box modal-spin spinning';
    playModalClick();
    count++;
    if (count >= total) {
      clearInterval(modalInterval);
      modalInterval = null;
      spinBox.textContent = rand(pool);
      spinBox.className   = 'modal-char-box modal-spin done';
      playModalChime();
      modalSpinning = false;
      closeBtn.disabled = false;
    }
  }, 70);
}

function closeSpinner() {
  if (modalSpinning) return; 
  const overlay = document.getElementById('spinnerModal');
  overlay.classList.remove('active');
  if (modalInterval) {
    clearInterval(modalInterval);
    modalInterval = null;
  }
  modalSpinning = false;
}

document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('spinnerModal');
  if (overlay) {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay && !modalSpinning) closeSpinner();
    });
  }
});

function makeImg(src, alt) {
  const img = document.createElement('img');
  img.src = src;
  img.alt = alt;
  return img;
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const pool = shuffle([
    ...CONS.map(c => ({type:'cons', char:c})),
    ...VOWS.map(v => ({type:'vowel', char:v}))
  ]);
  let idx = 0;

  const cp = document.createElement("div");
  cp.className = "cell center-panel";
  cp.style.gridColumn = "5 / 10";
  cp.style.gridRow = "2 / 7";
  cp.innerHTML = `
    <img class="title" src="${BASE}title.png" alt="Hangul Board Game" style="width:80%; object-fit:contain; padding:0; margin:0; margin-top: calc(var(--cell) * 1.1);">
    <div class="controls" style="margin-top:2px;">
      <div class="ctrl-box"><span class="ctrl-label">Roll the die</span><button class="dice-btn" id="dice-btn" onclick="rollDice(this)"></button></div>
      <div class="ctrl-box"><span class="ctrl-label">Reset Button</span><button class="reset-btn" onclick="playClickSound(); buildBoard()"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 12a8 8 0 1 1 1.5 4.8" stroke="white" stroke-width="2.5" stroke-linecap="round"/><polyline points="4,8 4,12 8,12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
    </div>
  `;
  board.appendChild(cp);

  const diceBtn = document.getElementById('dice-btn');
  if (diceBtn) diceBtn.innerHTML = getDiceSVG(6);

  setTimeout(placePieces, 50);

  POSITIONS.forEach(pos => {
    const key = `${pos.col}-${pos.row}`;
    const fixed = FIXED[key];
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.gridColumn = pos.col;
    cell.style.gridRow = pos.row;

    if (fixed === 'start') {
      cell.classList.add('start');
      cell.appendChild(makeImg(`${BASE}Start.png`, 'START'));
    } else if (fixed === 'goal') {
      cell.classList.add('goal');
      cell.appendChild(makeImg(`${BASE}Goal.png`, 'GOAL'));
    } else if (fixed === 'question') {
      cell.classList.add('fixed');
      cell.appendChild(makeImg(`${BASE}question.png`, '?'));
      cell.addEventListener('click', () => openSpinner('question', ''));
    } else if (fixed === 'mission') {
      cell.classList.add('fixed');
      cell.appendChild(makeImg(`${BASE}mission.png`, 'mission'));
    } else {
      const data = pool[idx++];
      if (data.type === 'cons') {
        cell.appendChild(makeImg(`${BASE}${encodeURIComponent(data.char)}.png`, data.char));
        cell.addEventListener('click', () => openSpinner('cons', data.char));
      } else {
        cell.appendChild(makeImg(`${BASE}${encodeURIComponent(data.char)}.png`, data.char));
        cell.addEventListener('click', () => openSpinner('vowel', data.char));
      }
    }
    board.appendChild(cell);
  });
}

function getDiceSVG(num) {
  const dots = {
    1: [[50,50]],
    2: [[30,30],[70,70]],
    3: [[30,30],[50,50],[70,70]],
    4: [[30,30],[70,30],[30,70],[70,70]],
    5: [[30,30],[70,30],[50,50],[30,70],[70,70]],
    6: [[30,26],[70,26],[30,50],[70,50],[30,74],[70,74]]
  };
  const circles = dots[num].map(([cx,cy]) =>
    `<circle cx="${cx}" cy="${cy}" r="9" fill="#222"/>`
  ).join('');
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="3" width="94" height="94" rx="18" ry="18" fill="white" stroke="#bbb" stroke-width="4"/>
    ${circles}
  </svg>`;
}

// 창 크기가 바뀔 때마다 실행되어 한 칸 크기를 업데이트하는 함수 유지
let currentCell = 80;
let pieceEls = [];

const PIECE_IMAGES = [
  `${BASE}Boy_1.png`,
  `${BASE}Girl_1.png`,
  `${BASE}Boy_2.png`,
  `${BASE}Girl_2.png`,
  `${BASE}Boy_3.png`,
  `${BASE}Girl_3.png`,
];

function placePieces() {
  pieceEls.forEach(p => p.remove());
  pieceEls = [];

  const board = document.getElementById('board');
  const br = board.getBoundingClientRect();
  const GAP = 4;
  
  // [핵심 연동] 고정 60px 대신 반응형으로 자동 계산되는 currentCell 변수의 72% 크기로 말 크기 연동
  const sz = currentCell * 0.72; 
  const totalW = PIECE_IMAGES.length * sz + (PIECE_IMAGES.length - 1) * 6;
  const startX = br.left + br.width / 2 - totalW / 2;
  const startY = br.top + (currentCell + GAP) * 1.05;

  PIECE_IMAGES.forEach((src, i) => {
    const el = document.createElement('div');
    el.className = 'piece-token';
    Object.assign(el.style, {
      position: 'fixed',
      left: (startX + i * (sz + 6)) + 'px',
      top: startY + 'px',
      width: sz + 'px',
      height: sz + 'px',
      cursor: 'grab',
      zIndex: '200',
      userSelect: 'none',
      filter: 'drop-shadow(1px 3px 4px rgba(0,0,0,0.4))',
    });
    const img = document.createElement('img');
    img.src = src;
    el.appendChild(img);
    makeDraggable(el);
    document.body.appendChild(el);
    pieceEls.push(el);
  });
}

function makeDraggable(el) {
  const start = (cx, cy) => {
    const ox = parseFloat(el.style.left);
    const oy = parseFloat(el.style.top);
    el.style.cursor = 'grabbing';
    el.style.zIndex = '1000';

    const move = (mx, my) => {
      el.style.left = (ox + mx - cx) + 'px';
      el.style.top  = (oy + my - cy) + 'px';
    };
    const end = () => {
      el.style.cursor = 'grab';
      el.style.zIndex = '200';
      document.removeEventListener('mousemove', onMM);
      document.removeEventListener('mouseup',   onMU);
      el.removeEventListener('touchmove', onTM);
      el.removeEventListener('touchend',  onTE);
    };
    const onMM = e => move(e.clientX, e.clientY);
    const onMU = () => end();
    const onTM = e => { e.preventDefault(); const t=e.touches[0]; move(t.clientX,t.clientY); };
    const onTE = () => end();

    document.addEventListener('mousemove', onMM);
    document.addEventListener('mouseup',   onMU);
    el.addEventListener('touchmove', onTM, { passive: false });
    el.addEventListener('touchend',  onTE);
  };

  el.addEventListener('mousedown', e => { e.preventDefault(); start(e.clientX, e.clientY); });
  el.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; start(t.clientX,t.clientY); }, { passive: false });
}

// 주사위 굴리기 및 효과음 기능 원본 유지
const diceAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playClickSound() {
  try {
    const o = diceAudioCtx.createOscillator(), g = diceAudioCtx.createGain();
    o.connect(g); g.connect(diceAudioCtx.destination);
    o.frequency.value = 400; o.type = 'sine';
    g.gain.setValueAtTime(0.1, diceAudioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, diceAudioCtx.currentTime + 0.05);
    o.start(diceAudioCtx.currentTime); o.stop(diceAudioCtx.currentTime + 0.05);
  } catch(e) {}
}

let isRolling = false;
function rollDice(btn) {
  if (isRolling) return;
  isRolling = true;
  
  let count = 0;
  const total = 10;
  const timer = setInterval(() => {
    const r = Math.floor(Math.random() * 6) + 1;
    btn.innerHTML = getDiceSVG(r);
    playClickSound();
    count++;
    if (count >= total) {
      clearInterval(timer);
      isRolling = false;
    }
  }, 90);
}

// 화면 해상도 대응 반응형 그리드 크기 자동 계산 함수 복귀
function handleResize() {
  const GAP = 4, COLS = 13, ROWS = 7;
  const maxW = window.innerWidth * 0.98;
  const maxH = window.innerHeight * 0.98;
  let cell = Math.floor((maxW - (COLS - 1) * GAP) / COLS);
  if (cell * ROWS + (ROWS - 1) * GAP > maxH) {
    cell = Math.floor((maxH - (ROWS - 1) * GAP) / ROWS);
  }
  if (cell < 30) cell = 30;
  currentCell = cell;
  document.documentElement.style.setProperty('--cell', cell + 'px');
  document.documentElement.style.setProperty('--gap', GAP + 'px');
  placePieces();
}

window.addEventListener('resize', handleResize);
window.addEventListener('DOMContentLoaded', () => {
  buildBoard();
  handleResize();
});
</script>
