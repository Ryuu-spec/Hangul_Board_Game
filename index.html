<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangul Board Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw;
  height: 100vh;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.board {
  display: grid;
  grid-template-columns: repeat(13, var(--cell));
  grid-template-rows: repeat(7, var(--cell));
  gap: var(--gap);
}
.cell {
  border: 2px solid #aaa;
  border-radius: 8px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.cell img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 4px;
}
.cell.start img,
.cell.goal img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.cell.start, .cell.goal { cursor: default; border: none; }
.cell.fixed { cursor: default; }

.center-panel {
  grid-column: 4 / span 7;
  grid-row: 2 / span 5;
  background: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: var(--panel-pad);
}
.title-img {
  width: 85%;
  max-width: 320px;
  object-fit: contain;
}
.char-select-bar {
  display: flex;
  gap: var(--char-gap);
  justify-content: center;
  align-items: center;
  width: 100%;
}
.char-btn {
  width: var(--char-size);
  height: var(--char-size);
  border-radius: 50%;
  border: 3px solid #eee;
  cursor: pointer;
  object-fit: contain;
  background: #fdfdfd;
  transition: all 0.2s;
}
.char-btn.active {
  border-color: #4CAF50;
  box-shadow: 0 0 10px rgba(76,175,80,0.5);
  transform: scale(1.1);
}
.controls-row {
  display: flex;
  gap: var(--control-gap);
  justify-content: center;
  align-items: center;
  width: 100%;
}
.control-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.control-label {
  font-family: sans-serif;
  font-size: var(--font-label);
  font-weight: bold;
  color: #666;
}
.btn-action {
  width: var(--btn-size);
  height: var(--btn-size);
  border: none;
  background: none;
  cursor: pointer;
  transition: transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-action img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.btn-action:hover { transform: scale(1.08); }
.btn-action:active { transform: scale(0.95); }
.btn-action:disabled { cursor: default; opacity: 0.5; transform: none; }

/* [여기만 핵심 수정!] 말 토큰의 크기를 고정px 대신 원래 코드의 한 칸 크기(--cell)의 80%로 설정 */
.piece {
  position: absolute;
  width: calc(var(--cell) * 0.8);
  height: calc(var(--cell) * 0.8);
  object-fit: contain;
  z-index: 100;
  transition: left 0.4s ease, top 0.4s ease;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="board" id="board">
  <div class="center-panel">
    <img id="title-logo" class="title-img" alt="Title">
    <div class="char-select-bar" id="char-bar"></div>
    <div class="controls-row">
      <div class="control-box">
        <div class="control-label">Roll the die</div>
        <button class="btn-action" id="btn-dice" onclick="roll()"><img id="img-dice" alt="Dice"></button>
      </div>
      <div class="control-box">
        <div class="control-label">Reset Button</div>
        <button class="btn-action" id="btn-reset" onclick="resetGame()"><img id="img-reset" alt="Reset"></button>
      </div>
    </div>
  </div>
</div>

<script>
const BASE = "https://raw.githubusercontent.com/sunmool3/hangul/main/";

const CHARS = [
  BASE+"Boy_1.png",
  BASE+"Girl_1.png",
  BASE+"Boy_2.png",
  BASE+"Girl_2.png",
  BASE+"Boy_3.png",
  BASE+"Girl_3.png"
];

const DICE_IMGS = [
  BASE+"dice1.png",
  BASE+"dice2.png",
  BASE+"dice3.png",
  BASE+"dice4.png",
  BASE+"dice5.png",
  BASE+"dice6.png"
];

const MAP_DATA = [
  { id:1,  type:"start",    val:"start.png", r:1, c:5 },
  { id:2,  type:"tile",     val:"s.png",     r:1, c:4 },
  { id:3,  type:"tile",     val:"m.png",     r:1, c:3 },
  { id:4,  type:"tile",     val:"yeo.png",   r:1, c:2 },
  { id:5,  type:"tile",     val:"gg.png",    r:1, c:1 },
  { id:6,  type:"tile",     val:"question.png", r:2, c:1 },
  { id:7,  type:"tile",     val:"i.png",     r:3, c:1 },
  { id:8,  type:"tile",     val:"tal.png",   r:4, c:1 },
  { id:9,  type:"tile",     val:"k.png",     r:4, c:2 },
  { id:10, type:"tile",     val:"j.png",     r:4, c:3 },
  { id:11, type:"tile",     val:"question.png", r:4, c:4 },
  { id:12, type:"tile",     val:"yeo.png",   r:5, c:4 },
  { id:13, type:"tile",     val:"tal.png",   r:6, c:4 },
  { id:14, type:"tile",     val:"t.png",     r:6, c:3 },
  { id:15, type:"tile",     val:"dd.png",    r:6, c:2 },
  { id:16, type:"tile",     val:"ch.png",    r:6, c:1 },
  { id:17, type:"tile",     val:"eo.png",    r:7, c:1 },
  { id:18, type:"tile",     val:"question.png", r:7, c:2 },
  { id:19, type:"tile",     val:"ng.png",    r:7, c:3 },
  { id:20, type:"tile",     val:"a.png",     r:7, c:4 },
  { id:21, type:"tile",     val:"n.png",     r:7, c:5 },
  { id:22, type:"tile",     val:"o.png",     r:7, c:6 },
  { id:23, type:"tile",     val:"eo.png",    r:7, c:7 },
  { id:24, type:"tile",     val:"tal.png",   r:7, c:8 },
  { id:25, type:"tile",     val:"jj.png",    r:7, c:9 },
  { id:26, type:"tile",     val:"yu.png",    r:7, c:10 },
  { id:27, type:"tile",     val:"ae.png",    r:7, c:11 },
  { id:28, type:"tile",     val:"t.png",     r:7, c:12 },
  { id:29, type:"tile",     val:"b.png",     r:6, c:12 },
  { id:30, type:"tile",     val:"question.png", r:5, c:12 },
  { id:31, type:"tile",     val:"ss.png",    r:4, c:12 },
  { id:32, type:"tile",     val:"tal.png",   r:4, c:11 },
  { id:33, type:"tile",     val:"e.png",     r:4, c:10 },
  { id:34, type:"tile",     val:"ya.png",    r:5, c:10 },
  { id:35, type:"tile",     val:"bb.png",    r:6, c:10 },
  { id:36, type:"tile",     val:"d.png",     r:6, c:9 },
  { id:37, type:"tile",     val:"g.png",     r:5, c:9 },
  { id:38, type:"tile",     val:"question.png", r:4, c:9 },
  { id:39, type:"tile",     val:"gg.png",    r:3, c:9 },
  { id:40, type:"tile",     val:"p.png",     r:3, c:10 },
  { id:41, type:"tile",     val:"e.png",     r:3, c:11 },
  { id:42, type:"tile",     val:"h.png",     r:3, c:12 },
  { id:43, type:"tile",     val:"tal.png",   r:2, c:12 },
  { id:44, type:"tile",     val:"r.png",     r:1, c:12 },
  { id:45, type:"tile",     val:"bb.png",    r:1, c:11 },
  { id:46, type:"tile",     val:"eu.png",    r:1, c:10 },
  { id:47, type:"tile",     val:"yeo.png",   r:1, c:9 },
  { id:48, type:"goal",     val:"goal.png",  r:1, c:8 }
];

let playerPos = [1,1,1,1,1,1];
let activeIdx = 0;
let isRolling = false;

const cellsMap = {};

function preload(srcs) {
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed; top:0; left:0; width:100vw; height:100vh; background:white;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:15px; z-index:9999;
    font-family:sans-serif;
  `;
  overlay.innerHTML = `
    <img src="${BASE}title.png" style="width:280px; object-fit:contain;">
    <div style="color:#555; font-size:15px; font-weight:600;">Loading...</div>
    <div style="width:240px; height:8px; background:#eee; border-radius:8px; overflow:hidden;">
      <div id=\"load-bar\" style="height:100%; width:0%; background:linear-gradient(90deg,#8BC34A,#4CAF50); border-radius:8px; transition:width 0.2s;"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  let loaded = 0;
  const bar = document.getElementById('load-bar');

  return Promise.all(srcs.map(src => new Promise(resolve => {
    const img = new Image();
    img.onload = img.onerror = () => {
      loaded++;
      if (bar) bar.style.width = (loaded / srcs.length * 100) + '%';
      resolve();
    };
    img.src = src;
  }))).then(() => {
    setTimeout(() => overlay.remove(), 200);
  });
}

function resize() {
  const GAP = 4, COLS = 13, ROWS = 7;
  const maxW = window.innerWidth * 0.96;
  const maxH = window.innerHeight * 0.96;
  
  let cell = Math.floor((maxW - (COLS - 1) * GAP) / COLS);
  if (cell * ROWS + (ROWS - 1) * GAP > maxH) {
    cell = Math.floor((maxH - (ROWS - 1) * GAP) / ROWS);
  }
  if (cell < 20) cell = 20;

  const root = document.documentElement;
  root.style.setProperty('--cell', cell + 'px');
  root.style.setProperty('--gap', GAP + 'px');
  root.style.setProperty('--panel-pad', Math.max(6, Math.floor(cell*0.2)) + 'px');
  root.style.setProperty('--char-size', Math.floor(cell*0.75) + 'px');
  root.style.setProperty('--char-gap', Math.max(4, Math.floor(cell*0.12)) + 'px');
  root.style.setProperty('--btn-size', Math.floor(cell*0.95) + 'px');
  root.style.setProperty('--control-gap', Math.floor(cell*0.8) + 'px');
  root.style.setProperty('--font-label', Math.max(10, Math.floor(cell*0.22)) + 'px');

  updateAllPieces();
}

function initGame() {
  document.getElementById('title-logo').src = BASE+"title.png";
  document.getElementById('img-dice').src = BASE+"dice1.png";
  document.getElementById('img-reset').src = BASE+"reset.png";

  const board = document.getElementById('board');
  MAP_DATA.forEach(d => {
    const div = document.createElement('div');
    div.className = `cell ${d.type}`;
    if(d.type==='fixed') div.classList.add('fixed');
    div.style.gridRow = d.r;
    div.style.gridColumn = d.c;

    if(d.val) {
      const img = document.createElement('img');
      img.src = BASE + d.val;
      div.appendChild(img);
    }
    board.appendChild(div);
    cellsMap[d.id] = div;
  });

  const bar = document.getElementById('char-bar');
  CHARS.forEach((src, idx) => {
    const img = document.createElement('img');
    img.className = `char-btn ${idx === 0 ? 'active' : ''}`;
    img.src = src;
    img.onclick = () => {
      if(isRolling) return;
      activeIdx = idx;
      document.querySelectorAll('.char-btn').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
      });
    };
    bar.appendChild(img);
  });

  CHARS.forEach((src, idx) => {
    const img = document.createElement('img');
    img.className = 'piece';
    img.id = `piece-${idx}`;
    img.src = src;
    img.onclick = () => {
      if(isRolling) return;
      activeIdx = idx;
      document.querySelectorAll('.char-btn').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
      });
    };
    document.body.appendChild(img);
  });

  window.addEventListener('resize', resize);
  resize();
}

// [핵심 변경] 원본의 고정 px 계산식(30, 40) 대신, 유동적인 --cell 값을 추적해 완벽히 중앙 정렬
function updateAllPieces() {
  const cellStyle = getComputedStyle(document.documentElement);
  const cellSize = parseFloat(cellStyle.getPropertyValue('--cell')) || 50;

  for(let i=0; i<6; i++) {
    const p = document.getElementById(`piece-${i}`);
    if(!p) continue;
    const cid = playerPos[i];
    const cellEl = cellsMap[cid];
    if(cellEl) {
      const rect = cellEl.getBoundingClientRect();
      
      // 말의 크기가 cellSize * 0.8 이므로, 남은 여백(0.2)의 절반만큼 이동해 정중앙 배치
      const offset = cellSize * 0.1; 
      
      // 겹치기 효과 오프셋
      const ox = (i % 3) * 4 - 4;
      const oy = Math.floor(i / 3) * 4 - 4;

      p.style.left = (window.scrollX + rect.left + offset + ox) + 'px';
      p.style.top = (window.scrollY + rect.top + offset + oy) + 'px';
    }
  }
}

function roll() {
  if(isRolling) return;
  isRolling = true;
  document.getElementById('btn-dice').disabled = true;
  document.getElementById('btn-reset').disabled = true;

  let count = 0;
  const imgDice = document.getElementById('img-dice');
  
  const timer = setInterval(() => {
    const rand = Math.floor(Math.random() * 6);
    imgDice.src = DICE_IMGS[rand];
    count++;
    if(count > 8) {
      clearInterval(timer);
      const finalRoll = Math.floor(Math.random() * 6) + 1;
      imgDice.src = DICE_IMGS[finalRoll - 1];

      let cur = playerPos[activeIdx];
      let nxt = cur + finalRoll;
      if(nxt > 48) nxt = 48;

      playerPos[activeIdx] = nxt;
      updateAllPieces();

      isRolling = false;
      document.getElementById('btn-dice').disabled = false;
      document.getElementById('btn-reset').disabled = false;
    }
  }, 80);
}

function resetGame() {
  if(isRolling) return;
  playerPos = [1,1,1,1,1,1];
  updateAllPieces();
  document.getElementById('img-dice').src = DICE_IMGS[0];
}

const allAssets = [
  BASE+"title.png", BASE+"reset.png",
  BASE+"start.png", BASE+"goal.png", BASE+"question.png", BASE+"tal.png",
  BASE+"s.png", BASE+"m.png", BASE+"yeo.png", BASE+"gg.png", BASE+"i.png",
  BASE+"k.png", BASE+"j.png", BASE+"t.png", BASE+"dd.png", BASE+"ch.png",
  BASE+"eo.png", BASE+"ng.png", BASE+"a.png", BASE+"n.png", BASE+"o.png",
  BASE+"jj.png", BASE+"yu.png", BASE+"ae.png", BASE+"b.png", BASE+"ss.png",
  BASE+"e.png", BASE+"ya.png", BASE+"bb.png", BASE+"d.png", BASE+"g.png",
  BASE+"p.png", BASE+"h.png", BASE+"r.png", BASE+"eu.png",
  ...CHARS, ...DICE_IMGS
];

preload(allAssets).then(() => {
  initGame();
});
</script>
</body>
</html>
